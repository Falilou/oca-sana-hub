  <!-- Globe Icon -->
  <circle cx="16" cy="16" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="5" ry="10" stroke="white" stroke-width="1.2" fill="none" opacity="0.7"/>
  <ellipse cx="16" cy="16" rx="10" ry="5" stroke="white" stroke-width="1.2" fill="none" opacity="0.7"/>
  <circle cx="16" cy="16" r="3" fill="white" opacity="0.9"/>
