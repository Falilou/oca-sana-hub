<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Globe Structure - Geometric Modern Design -->
  <g filter="url(#glow)">
    <!-- Outer Ring -->
    <circle cx="256" cy="256" r="140" stroke="white" stroke-width="8" fill="none" opacity="0.3"/>
    
    <!-- Middle Ring -->
    <circle cx="256" cy="256" r="110" stroke="white" stroke-width="6" fill="none" opacity="0.5"/>
    
    <!-- Inner Core -->
    <circle cx="256" cy="256" r="50" fill="white" opacity="0.9"/>
    
    <!-- Vertical Lines (Longitude) -->
    <ellipse cx="256" cy="256" rx="35" ry="140" stroke="white" stroke-width="4" fill="none" opacity="0.6"/>
    <ellipse cx="256" cy="256" rx="70" ry="140" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
    <ellipse cx="256" cy="256" rx="105" ry="140" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
    
    <!-- Horizontal Lines (Latitude) -->
    <ellipse cx="256" cy="256" rx="140" ry="35" stroke="white" stroke-width="4" fill="none" opacity="0.6"/>
    <ellipse cx="256" cy="256" rx="140" ry="70" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
    <ellipse cx="256" cy="256" rx="140" ry="105" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
    
    <!-- Connection Nodes (Portal Points) -->
    <circle cx="256" cy="116" r="8" fill="white" opacity="0.9"/>
    <circle cx="256" cy="396" r="8" fill="white" opacity="0.9"/>
    <circle cx="116" cy="256" r="8" fill="white" opacity="0.9"/>
    <circle cx="396" cy="256" r="8" fill="white" opacity="0.9"/>
    
    <!-- Diagonal Nodes -->
    <circle cx="186" cy="186" r="6" fill="white" opacity="0.8"/>
    <circle cx="326" cy="186" r="6" fill="white" opacity="0.8"/>
    <circle cx="186" cy="326" r="6" fill="white" opacity="0.8"/>
    <circle cx="326" cy="326" r="6" fill="white" opacity="0.8"/>
    
    <!-- Central Hub Symbol - OCA -->
    <text x="256" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1E40AF" text-anchor="middle">OCA</text>
  </g>
  
  <!-- Orbiting Elements (Portal Data Flow) -->
  <g opacity="0.7">
    <circle cx="256" cy="96" r="4" fill="#60A5FA"/>
    <circle cx="416" cy="256" r="4" fill="#60A5FA"/>
    <circle cx="256" cy="416" r="4" fill="#60A5FA"/>
    <circle cx="96" cy="256" r="4" fill="#60A5FA"/>
  </g>
</svg>
